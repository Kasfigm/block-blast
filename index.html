<!DOCTYPE html>
<html>
<head>
    <title>Block Blast</title>
    <style>
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(8, 40px);
            gap: 3px;
        }

        .cell {
            width: 40px;
            height: 40px;
            background: #444;
            cursor: pointer;
        }

        .cell.active {
            background: #00ff88;
        }
    </style>
</head>
<body>

<div class="grid"></div>

<script>
    const grid = document.querySelector(".grid");

    for (let i = 0; i < 64; i++) {
        const cell = document.createElement("div");
        cell.classList.add("cell");

        cell.addEventListener("click", () => {
            cell.classList.toggle("active");
        });

        grid.appendChild(cell);
    }
</script>

</body>
</html>
