<!DOCTYPE html>
<html>
<head>
<title>Block Blast</title>

<style>
body {
    margin:0;
    background: linear-gradient(#c7351e,#9e2a15);
    display:flex;
    flex-direction:column;
    align-items:center;
    font-family: Arial;
    color:white;
}

.header {
    width:320px;
    display:flex;
    justify-content:space-between;
    margin-top:15px;
    font-size:20px;
}

.score {
    font-size:40px;
    margin:10px 0;
    font-weight:bold;
}

.grid {
    display:grid;
    grid-template-columns: repeat(8, 35px);
    gap:4px;
    background:#7a2b1b;
    padding:8px;
    border-radius:10px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

.cell {
    width:35px;
    height:35px;
    background:#4b1f15;
    border-radius:4px;
}

.cell.filled {
    background:linear-gradient(#ffd84d,#f2b705);
}

.blocks {
    display:flex;
    gap:25px;
    margin-top:30px;
}

.mini-grid {
    display:grid;
    grid-template-columns: repeat(3, 20px);
    gap:3px;
    cursor:pointer;
}

.mini-cell {
    width:20px;
    height:20px;
    background:#4b1f15;
    border-radius:3px;
}

.mini-cell.active {
    background:linear-gradient(#ffd84d,#f2b705);
}

.selected {
    outline:3px solid #fff;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="header">
    👑 44721
    ⚙️
</div>

<div class="score" id="score">0</div>

<div class="grid"></div>

<div class="blocks" id="blocks"></div>

<script>
const grid = document.querySelector(".grid");
const blocksContainer = document.getElementById("blocks");
const scoreText = document.getElementById("score");
const size = 8;
let selectedBlock = null;
let score = 0;

for (let i = 0; i < size * size; i++) {
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.dataset.index = i;
    cell.addEventListener("click", placeBlock);
    grid.appendChild(cell);
}

const shapes = [
    [0,1,3],
    [0,1,2],
    [0,3,4]
];

function generateBlocks() {
    blocksContainer.innerHTML = "";
    for (let i = 0; i < 3; i++) {
        const shape = shapes[Math.floor(Math.random()*shapes.length)];
        createMiniBlock(shape);
    }
}

function createMiniBlock(shape) {
    const mini = document.createElement("div");
    mini.classList.add("mini-grid");

    for (let i = 0; i < 9; i++) {
        const cell = document.createElement("div");
        cell.classList.add("mini-cell");
        if (shape.includes(i)) cell.classList.add("active");
        mini.appendChild(cell);
    }

    mini.addEventListener("click", () => {
        document.querySelectorAll(".mini-grid").forEach(b=>b.classList.remove("selected"));
        mini.classList.add("selected");
        selectedBlock = shape;
    });

    blocksContainer.appendChild(mini);
}

function placeBlock(e) {
    if (!selectedBlock) return;

    const start = parseInt(e.target.dataset.index);

    for (let offset of selectedBlock) {
        const rowOffset = Math.floor(offset/3);
        const colOffset = offset%3;

        const targetIndex = start + rowOffset*size + colOffset;
        const cell = document.querySelector(`[data-index='${targetIndex}']`);

        if (!cell || cell.classList.contains("filled")) return;
    }

    for (let offset of selectedBlock) {
        const rowOffset = Math.floor(offset/3);
        const colOffset = offset%3;

        const targetIndex = start + rowOffset*size + colOffset;
        const cell = document.querySelector(`[data-index='${targetIndex}']`);
        cell.classList.add("filled");
        score += 5;
    }

    scoreText.textContent = score;

    selectedBlock = null;
    document.querySelectorAll(".mini-grid").forEach(b=>b.classList.remove("selected"));
}

generateBlocks();
</script>

</body>
</html>
